services:
  - type: web
    name: ai-onboarding-automation
    runtime: python
    plan: free
    buildCommand: pip install -r starter/code/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir starter/code
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set in Render dashboard
      - key: MODEL_NAME
        value: openai/gpt-oss-120b
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: DATABASE_URL
        value: sqlite:///./onboarding.db
    healthCheckPath: /health
